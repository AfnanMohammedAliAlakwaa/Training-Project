<style id="reports-page-styles">
/* ??????? ???? ???????? */

.reports-page {
        font-family: Tahoma, Arial, sans-serif;
        color: #12213a;
        padding: 0 8px 28px;
        font-size: 13px;
        line-height: 1.7;
        position: relative;
    }

    .reports-toast {
        position: fixed;
        top: 18px;
        left: 24px;
        z-index: 10000;
        min-width: 260px;
        max-width: 360px;
        background: #ffffff;
        border: 1px solid #dbe4ef;
        border-right: 5px solid #0f62d6;
        box-shadow: 0 16px 40px rgba(15, 23, 42, 0.16);
        border-radius: 14px;
        padding: 12px 14px;
        display: flex;
        align-items: center;
        gap: 10px;
        opacity: 0;
        transform: translateY(-12px);
        pointer-events: none;
        transition: 0.25s ease;
        direction: rtl;
    }

    .reports-toast.show {
        opacity: 1;
        transform: translateY(0);
    }

    .reports-toast.success {
        border-right-color: #20844f;
    }

    .reports-toast.warning {
        border-right-color: #d3911d;
    }

    .reports-toast.error {
        border-right-color: #bd3131;
    }

    .reports-toast.info {
        border-right-color: #0f62d6;
    }

    .reports-toast span {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        background: #eaf2ff;
        color: #0f62d6;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 900;
        flex-shrink: 0;
    }

    .reports-toast.success span {
        background: #e8f7ee;
        color: #20844f;
    }

    .reports-toast.warning span {
        background: #fff4db;
        color: #b26f0c;
    }

    .reports-toast.error span {
        background: #ffe8e8;
        color: #bd3131;
    }

    .reports-toast p {
        margin: 0;
        color: #12213a;
        font-size: 12px;
        font-weight: 800;
    }

    .reports-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        min-height: 96px;
        margin-bottom: 18px;
        padding: 18px 24px;
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 22px;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.055);
        direction: ltr;
    }

    .reports-breadcrumb {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 8px;
        color: #7b8798;
        font-size: 12px;
        font-weight: 700;
        direction: rtl;
        white-space: nowrap;
        flex-shrink: 0;
    }

    .breadcrumb-link {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        color: #64748b;
        text-decoration: none;
        transition: 0.2s ease;
    }

    .breadcrumb-link:hover {
        color: #0f62d6;
    }

    .breadcrumb-home-icon {
        font-size: 13px;
        color: #64748b;
        transition: 0.2s ease;
    }

    .breadcrumb-link:hover .breadcrumb-home-icon {
        color: #0f62d6;
    }

    .breadcrumb-separator {
        color: #a5b4c7;
        font-size: 13px;
    }

    .breadcrumb-current {
        color: #475569;
        font-weight: 800;
    }

    .reports-heading {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 14px;
        direction: rtl;
        flex-shrink: 0;
        margin: 0;
    }

    .reports-heading-icon {
        width: 58px;
        height: 58px;
        border-radius: 16px;
        background: #2166d5;
        color: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 25px;
        flex-shrink: 0;
        box-shadow: 0 10px 22px rgba(33, 102, 213, 0.20);
    }

    .reports-heading-text {
        text-align: right;
        direction: rtl;
    }

    .reports-heading-text h1 {
        margin: 0;
        color: #0f1f3d;
        font-size: 30px;
        font-weight: 900;
        line-height: 1.1;
        letter-spacing: -0.4px;
    }

    .reports-heading-text p {
        margin: 5px 0 0;
        color: #7a8798;
        font-size: 13px;
        font-weight: 600;
        line-height: 1.4;
    }

    .header-actions {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 12px;
        direction: ltr;
        flex-shrink: 0;
        flex-wrap: wrap;
    }

    .header-actions .report-action-btn {
        height: 48px;
        min-width: 150px;
        border-radius: 12px;
        padding: 0 18px;
    }

    .header-actions .primary-action {
        min-width: 165px;
    }


    .filters-card {
        background: white;
        border: 1px solid #e2e8f0;
        border-radius: 18px;
        padding: 16px;
        display: grid;
        grid-template-columns: 1.5fr repeat(4, 1fr) auto;
        gap: 12px;
        align-items: end;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.055);
        margin-bottom: 14px;
    }

    .search-field {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 44px;
        gap: 8px;
        align-items: end;
    }

    .search-field input {
        width: 100%;
        height: 43px;
        border: 1px solid #d5deea;
        background: #f8fafc;
        border-radius: 12px;
        padding: 0 12px;
        color: #1e293b;
        outline: none;
        font-size: 12px;
        box-sizing: border-box;
        transition: 0.2s ease;
    }

    .search-field input:focus,
    .filter-field select:focus {
        border-color: #0f62d6;
        background: #ffffff;
        box-shadow: 0 0 0 3px rgba(15, 98, 214, 0.08);
    }

    .search-field button {
        height: 43px;
        width: 44px;
        border: 1px solid #d5deea;
        background: #ffffff;
        color: #0f62d6;
        border-radius: 12px;
        cursor: pointer;
        font-size: 17px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: 0.2s ease;
    }

    .search-field button:hover {
        background: #eaf2ff;
        border-color: #0f62d6;
    }

    .filter-field label {
        display: block;
        font-weight: 800;
        color: #263859;
        font-size: 12px;
        margin-bottom: 6px;
    }

    .filter-field select {
        width: 100%;
        height: 43px;
        border: 1px solid #d5deea;
        background: #f8fafc;
        border-radius: 12px;
        padding: 0 10px;
        color: #1e293b;
        outline: none;
        font-size: 12px;
        transition: 0.2s ease;
    }

    .btn {
        height: 43px;
        border: none;
        border-radius: 11px;
        padding: 0 18px;
        font-size: 12px;
        font-weight: 800;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        text-decoration: none;
        transition: 0.2s ease;
        white-space: nowrap;
    }

    .btn-primary {
        background: #0f62d6;
        color: white;
        box-shadow: 0 10px 22px rgba(15, 98, 214, 0.18);
    }

    .btn-primary:hover {
        background: #0b50b4;
    }

    .btn-light,
    .btn-reset {
        background: white;
        color: #18345e;
        border: 1px solid #cbd5e1;
    }

    .btn-light:hover,
    .btn-reset:hover {
        background: #f8fafc;
    }

    .btn-excel {
        background: #217346;
        color: white;
        border: 1px solid #217346;
    }

    .btn-excel:hover {
        background: #185c37;
        color: white;
    }

    .actions-row {
        display: flex;
        justify-content: flex-start;
        align-items: center;
        gap: 12px;
        margin-bottom: 18px;
        direction: ltr;
        flex-wrap: wrap;
    }

    .report-action-btn {
        height: 42px;
        min-width: 128px;
        border-radius: 8px;
        padding: 0 16px;
        border: 1px solid #cbd5e1;
        background: #ffffff;
        color: #12315f;
        font-size: 12px;
        font-weight: 800;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        direction: rtl;
        transition: 0.2s ease;
        box-shadow: 0 2px 6px rgba(15, 23, 42, 0.04);
        text-decoration: none;
    }

    .report-action-btn:hover {
        background: #f8fafc;
        border-color: #9fb0c7;
        transform: translateY(-1px);
    }

    .primary-action {
        background: #0f62d6;
        border-color: #0f62d6;
        color: #ffffff;
        min-width: 135px;
    }

    .primary-action:hover {
        background: #0b50b4;
        border-color: #0b50b4;
    }

    .light-action {
        background: #ffffff;
        color: #12315f;
    }

    .action-icon {
        font-size: 14px;
        line-height: 1;
    }

    .action-file-icon {
        width: 22px;
        height: 22px;
        border: 1px solid #9fb0c7;
        border-radius: 4px;
        color: #12315f;
        font-size: 8px;
        font-weight: 900;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: #f8fafc;
    }

    .action-chart-icon {
        font-size: 15px;
        line-height: 1;
    }

    .stats-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 14px;
        margin-bottom: 18px;
    }

    .stat-card {
        background: white;
        border: 1px solid #e2e8f0;
        border-radius: 18px;
        padding: 18px;
        min-height: 105px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.055);
        transition: 0.2s ease;
    }

    .stat-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 14px 32px rgba(15, 23, 42, 0.08);
    }

    .stat-card span {
        display: block;
        font-size: 12px;
        font-weight: 900;
        margin-bottom: 6px;
    }

    .stat-card strong {
        display: block;
        font-size: 27px;
        color: #102447;
        line-height: 1.2;
    }

    .stat-card p {
        margin: 4px 0 0;
        color: #64748b;
        font-size: 11.5px;
    }

    .stat-icon {
        width: 54px;
        height: 54px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        flex-shrink: 0;
    }

    .stat-card.blue span {
        color: #0f62d6;
    }

    .stat-card.blue .stat-icon {
        background: #eaf2ff;
        color: #0f62d6;
    }

    .stat-card.green span {
        color: #20844f;
    }

    .stat-card.green .stat-icon {
        background: #e8f7ee;
        color: #20844f;
    }

    .stat-card.purple span {
        color: #6b36c9;
    }

    .stat-card.purple .stat-icon {
        background: #f2eafe;
        color: #6b36c9;
    }

    .stat-card.orange span {
        color: #c98216;
    }

    .stat-card.orange .stat-icon {
        background: #fff4db;
        color: #c98216;
    }

    .main-dashboard-layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 300px;
        gap: 14px;
        align-items: stretch;
        direction: ltr;
    }

    .main-column,
    .recent-panel {
        direction: rtl;
    }

    .main-column {
        display: grid;
        gap: 14px;
    }

    .panel,
    .recent-panel {
        background: white;
        border: 1px solid #e2e8f0;
        border-radius: 18px;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.055);
    }

    .summary-panel {
        padding: 14px 16px;
        min-height: 245px;
    }

    .reports-table-panel {
        padding: 14px 16px;
        min-height: 260px;
    }

    .panel-header,
    .recent-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 10px;
    }

    .panel-header h2,
    .recent-header h2 {
        margin: 0 0 3px;
        color: #102447;
        font-size: 17px;
        font-weight: 900;
    }

    .panel-header p,
    .recent-header p {
        margin: 0;
        color: #64748b;
        font-size: 11.5px;
    }

    .panel-icon,
    .recent-header span {
        color: #0f62d6;
        font-size: 18px;
    }

    .table-panel-header {
        align-items: center;
        flex-direction: row;
        flex-wrap: nowrap;
    }

    .table-panel-header > div:first-child {
        flex: 1 1 auto;
        min-width: 0;
        text-align: right;
    }

    .table-tools {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 8px;
        direction: ltr;
        flex-wrap: nowrap;
        flex: 0 0 auto;
        width: auto;
    }

    .table-tools .report-action-btn {
        height: 36px;
        min-width: 118px;
        padding: 0 10px;
        font-size: 11px;
        border-radius: 10px;
        white-space: nowrap;
    }

    .table-tools .primary-action {
        min-width: 132px;
    }

    .program-bar-box {
        direction: rtl;
    }

    .program-bar-box h3 {
        margin: 0 0 4px;
        color: #263859;
        font-size: 12px;
        text-align: center;
        font-weight: 900;
    }

    .bar-chart-note {
        margin: 0 0 10px;
        color: #64748b;
        font-size: 10.5px;
        text-align: center;
    }

    .program-bars {
        display: grid;
        gap: 9px;
    }

    .program-bar-row {
        display: grid;
        grid-template-columns: 185px minmax(0, 1fr);
        gap: 10px;
        align-items: center;
    }

    .program-name-line {
        display: grid;
        grid-template-columns: 20px minmax(0, max-content);
        align-items: center;
        justify-content: start;
        gap: 6px;
        margin-bottom: 1px;
        direction: rtl;
        text-align: right;
    }

    .program-name-line .program-rank {
        grid-column: 1;
        grid-row: 1;
    }

    .program-name-line strong {
        grid-column: 2;
        grid-row: 1;
        text-align: right;
    }

    .program-rank {
        width: 20px;
        height: 20px;
        border-radius: 7px;
        background: #eaf2ff;
        color: #0f62d6;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        font-weight: 900;
        flex-shrink: 0;
    }

    .program-bar-meta {
        direction: rtl;
        text-align: right;
    }

    .program-bar-meta strong {
        display: block;
        color: #102447;
        font-size: 11px;
        margin-bottom: 0;
    }

    .program-bar-meta > span {
        display: block;
        color: #64748b;
        font-size: 9.5px;
        white-space: nowrap;
        text-align: right;
    }

    .stacked-bar {
        height: 18px;
        background: #eef2f7;
        border-radius: 999px;
        overflow: hidden;
        display: flex;
        direction: rtl;
        border: 1px solid #e2e8f0;
    }

    .ready-segment {
        display: block;
        height: 100%;
        background: #4caf63;
    }

    .missing-segment {
        display: block;
        height: 100%;
        background: #f6b73c;
    }

    .bar-legend {
        display: flex;
        justify-content: center;
        gap: 14px;
        flex-wrap: wrap;
        margin-top: 11px;
        color: #64748b;
        font-size: 10.5px;
        font-weight: 800;
    }

    .bar-legend span {
        display: inline-flex;
        align-items: center;
        gap: 6px;
    }

    .bar-legend i {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        display: inline-block;
    }

    .legend-ready {
        background: #4caf63;
    }

    .legend-missing {
        background: #f6b73c;
    }

    .charts-layout {
        display: grid;
        grid-template-columns: 1.35fr 0.9fr;
        gap: 12px;
        direction: ltr;
        align-items: center;
    }

    .line-chart-box,
    .donut-box {
        direction: rtl;
    }

    .line-chart-box h3,
    .donut-box h3 {
        margin: 0 0 8px;
        color: #263859;
        font-size: 12px;
        text-align: center;
        font-weight: 900;
    }

    .line-chart {
        height: 170px;
        position: relative;
    }

    .line-chart svg {
        width: 100%;
        height: 140px;
    }

    .line-chart line {
        stroke: #e2e8f0;
        stroke-width: 1;
    }

    .line-chart polyline {
        fill: none;
        stroke: #0f62d6;
        stroke-width: 4;
        stroke-linecap: round;
        stroke-linejoin: round;
    }

    .line-chart circle {
        fill: #0f62d6;
        stroke: white;
        stroke-width: 3;
    }

    .months-row {
        display: grid;
        grid-template-columns: repeat(8, 1fr);
        gap: 3px;
        color: #64748b;
        font-size: 9.5px;
        text-align: center;
        margin-top: 4px;
    }

    .donut-summary {
        display: flex;
        align-items: center;
        gap: 12px;
        justify-content: center;
    }

    .donut-chart {
        width: 128px;
        height: 128px;
        border-radius: 50%;
        background: #e8eef5;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
    }

    .donut-chart::after {
        content: "";
        width: 72px;
        height: 72px;
        background: white;
        border-radius: 50%;
        position: absolute;
    }

    .donut-chart div {
        position: relative;
        z-index: 2;
        text-align: center;
    }

    .donut-chart strong {
        display: block;
        font-size: 18px;
        color: #102447;
    }

    .donut-chart span {
        color: #64748b;
        font-size: 10px;
    }

    .donut-legend {
        display: grid;
        gap: 7px;
        min-width: 110px;
    }

    .donut-legend div {
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 6px;
        align-items: center;
        font-size: 10.5px;
    }

    .donut-legend p {
        margin: 0;
        color: #64748b;
    }

    .donut-legend strong {
        color: #102447;
    }

    .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        display: inline-block;
    }

    .green-dot {
        background: #4caf63;
    }

    .blue-dot {
        background: #2166d5;
    }

    .orange-dot {
        background: #f6b73c;
    }

    .red-dot {
        background: #e34b4b;
    }

    .table-wrapper {
        width: 100%;
        overflow-x: auto;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        min-width: 790px;
    }

    th {
        background: #f8fafc;
        color: #263859;
        font-size: 11px;
        font-weight: 900;
        padding: 9px 10px;
        text-align: right;
        border-bottom: 1px solid #e2e8f0;
        white-space: nowrap;
    }

    td {
        padding: 8px 10px;
        border-bottom: 1px solid #e8eef5;
        color: #334155;
        font-size: 11px;
        vertical-align: middle;
    }

    td strong {
        display: block;
        color: #102447;
        font-size: 11.5px;
        margin-bottom: 2px;
    }

    td small {
        display: block;
        color: #64748b;
        font-size: 10px;
        max-width: 280px;
    }

    .reports-table tbody tr {
        cursor: pointer;
        transition: 0.2s ease;
    }

    .reports-table tbody tr:not(.empty-reports-row):hover {
        background: #f8fbff;
    }

    .reports-table tbody tr.selected-report-row {
        background: #eef6ff;
        box-shadow: none;
    }

    .reports-table tbody tr.selected-report-row td {
        border-bottom-color: #cfe3ff;
    }

    .status-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        padding: 4px 9px;
        font-size: 10px;
        font-weight: 900;
        white-space: nowrap;
    }

    .status-badge.success {
        background: #e8f7ee;
        color: #20844f;
    }

    .status-badge.warning {
        background: #fff4db;
        color: #b26f0c;
    }

    .status-badge.danger {
        background: #ffe8e8;
        color: #bd3131;
    }

    .status-badge.info {
        background: #eaf2ff;
        color: #0f62d6;
    }

    .table-progress-cell {
        min-width: 118px;
        display: flex;
        align-items: center;
        gap: 8px;
        justify-content: center;
        direction: ltr;
    }

    .table-progress-cell strong {
        display: inline-block;
        min-width: 34px;
        margin: 0;
        color: #1f4568;
        font-size: 11px;
        font-weight: 900;
        text-align: left;
    }

    .mini-progress-bar {
        width: 76px;
        height: 8px;
        border-radius: 999px;
        background: #e5edf6;
        overflow: hidden;
        box-shadow: inset 0 0 0 1px rgba(15, 43, 85, 0.04);
    }

    .mini-progress-bar span {
        display: block;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #0f62d6, #2b8cf0);
    }

    .status-badge-chip {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        padding: 5px 10px;
